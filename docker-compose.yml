version: '3.8'

services:
  db:
    image: postgres
    environment:
      POSTGRES_DB: prompts
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password

  redis:
    image: redis

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend/prompt-ui
    ports:
      - "4200:4200"